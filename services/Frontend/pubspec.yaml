name: soobshio
description: "Пульс города Нижневартовск — Flutter MVP"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  rive: ^0.14.3
  lottie: ^3.1.2

  # Maps
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # HTTP + State
  http: ^1.2.2
  provider: ^6.1.2

  # Local DB
  sqflite: ^2.3.3
  path: ^1.9.0

  # Telegram
  url_launcher: ^6.3.0

  # WebSocket (для реал-тайм обновлений)
  web_socket_channel: ^3.0.1

  # JSON
  json_annotation: ^4.11.0
  sensors_plus: ^7.0.0
  flutter_map_marker_cluster: ^8.2.2
  flutter_svg: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/animations/
    - assets/rive/
    - assets/markers/
    - assets/infographic_data.json