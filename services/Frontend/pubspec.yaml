name: soobshio
description: "Пульс города Нижневартовск — Flutter MVP"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  audioplayers: ^6.1.1

  # UI
  cupertino_icons: ^1.0.8
  rive: ^0.14.3
  lottie: ^3.1.2

  # Maps
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # HTTP + State
  http: ^1.2.2
  provider: ^6.1.2

  # Local DB
  sqflite: ^2.3.3
  path: ^1.9.0

  # Telegram
  url_launcher: ^6.3.0

  # WebSocket (для реал-тайм обновлений)
  web_socket_channel: ^3.0.1

  # JSON
  json_annotation: ^4.11.0
  sensors_plus: ^7.0.0
  flutter_map_marker_cluster: ^8.2.2
  flutter_svg: ^2.2.3
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4
  image_picker: ^1.2.1
  webview_flutter: ^4.13.1
  flutter_vlc_player: ^7.4.4
  video_player: ^2.11.0
  chewie: ^1.13.0
  geolocator: ^14.0.2
  awesome_notifications: ^0.11.0
  google_fonts: ^8.0.2
  fl_chart: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/animations/
    - assets/rive/
    - assets/markers/
    - assets/infographic_data.json
    - assets/icon.png
    - assets/cesium_view.html
    - assets/cameras_nv.json
    - assets/sounds/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
