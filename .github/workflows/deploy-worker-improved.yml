name: Deploy CF Worker (Improved)

on:
  push:
    paths:
      - 'cloudflare-worker/worker.js'
      - 'cloudflare-worker/wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Verify Worker Syntax
        working-directory: cloudflare-worker
        run: |
          echo "Checking worker.js syntax..."
          node -c worker.js || (echo "Syntax error in worker.js!" && exit 1)
          echo "✅ Syntax OK"

      - name: Check Worker Size
        working-directory: cloudflare-worker
        run: |
          SIZE=$(wc -c < worker.js)
          echo "Worker size: $SIZE bytes"
          if [ $SIZE -gt 10485760 ]; then
            echo "⚠️ Warning: Worker exceeds 10MB limit"
          fi

      - name: Deploy Worker
        working-directory: cloudflare-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b55123fb7c25f3c5f38a1dcab5a36fa8
        run: |
          echo "Deploying worker..."
          wrangler deploy --compatibility-date=2024-01-01 || {
            echo "❌ Deploy failed!"
            echo "Trying with verbose output..."
            wrangler deploy --compatibility-date=2024-01-01 --log-level debug
            exit 1
          }
          echo "✅ Deploy successful!"

      - name: Verify Deployment
        run: |
          sleep 5
          curl -f https://anthropic-proxy.uiredepositionherzo.workers.dev/health || {
            echo "⚠️ Health check failed, but deploy may still be processing"
          }
