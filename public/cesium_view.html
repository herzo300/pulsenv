<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
  <title>City Pulse 3D View</title>
  <script src="https://cdn.jsdelivr.net/npm/cesium@1.119.0/Build/Cesium/Cesium.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/cesium@1.119.0/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html,
    body,
    #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #020617;
    }

    .cesium-viewer-bottom,
    .cesium-widget-credits {
      display: none !important;
    }

    .cesium-viewer-toolbar {
      top: 60px !important;
    }

    .cesium-infoBox {
      background: rgba(15, 15, 35, 0.95) !important;
      border: 1px solid #00E5FF !important;
      color: white !important;
    }

    #camCount {
      position: fixed;
      bottom: 12px;
      left: 12px;
      background: rgba(0, 229, 255, 0.15);
      border: 1px solid #00E5FF;
      border-radius: 8px;
      padding: 6px 14px;
      color: #00E5FF;
      font: bold 11px sans-serif;
      letter-spacing: 1px;
      z-index: 999;
      pointer-events: none;
    }

    #statusBadge {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 8px;
      padding: 4px 10px;
      font: 10px sans-serif;
      letter-spacing: 0.5px;
      z-index: 999;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="loading"
    style="position:fixed;top:0;left:0;width:100%;height:100%;background:#020617;color:#00E5FF;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;z-index:9999;">
    <div
      style="width:40px;height:40px;border:3px solid #00E5FF;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;">
    </div>
    <p style="margin-top:20px;font-weight:bold;letter-spacing:2px;font-size:12px;">ПУЛЬС 3D...</p>
  </div>
  <style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <div id="cesiumContainer"></div>
  <div id="camCount" style="display:none;">📹 0 камер</div>
  <div id="statusBadge" style="display:none;"></div>
  <script>
    window.setIonToken = (token) => { Cesium.Ion.defaultAccessToken = token; };

    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider: new Cesium.EllipsoidTerrainProvider(),
      animation: false, timeline: false, navigationHelpButton: false,
      sceneModePicker: true, baseLayerPicker: true, fullscreenButton: false,
      homeButton: true, geocoder: false, selectionIndicator: true, infoBox: true,
      skyAtmosphere: true, fog: true, requestRenderMode: false, logarithmicDepthBuffer: true,
      contextOptions: {
        webgl: {
          alpha: false,
          antialias: true,
          preserveDrawingBuffer: false,
          failIfMajorPerformanceCaveat: false
        }
      }
    });

    // ── Status badge ──
    function showStatus(text, color) {
      const badge = document.getElementById('statusBadge');
      if (badge) {
        badge.textContent = text;
        badge.style.color = color || '#94a3b8';
        badge.style.borderLeft = `3px solid ${color || '#94a3b8'}`;
        badge.style.display = 'block';
      }
    }

    // ── Geoportal 3D tiles ──
    const GEOPORTAL_LAYERS = {
      '2025': { id: 1114, matrix: [-0.972733, -0.202718, 0.112672, 724182.353291, 0.231926, -0.850230, 0.472565, 3022657.267975, 0.0, 0.485811, 0.874063, 5549873.669934, 0.0, 0.0, 0.0, 1.0] },
      '2023': { id: 1060, matrix: [-0.972733, -0.202718, 0.112672, 724182.3533, 0.231926, -0.85023, 0.472565, 3022657.268, 0.0, 0.485811, 0.874063, 5549873.67, 0.0, 0.0, 0.0, 1.0] }
    };
    let activeTileset = null;
    let tilesLoaded = false;

    async function loadGeoportalTiles(year = '2025') {
      if (!viewer || !viewer.scene) return;
      if (activeTileset) viewer.scene.primitives.remove(activeTileset);
      const config = GEOPORTAL_LAYERS[year];
      try {
        const tileset = await Cesium.Cesium3DTileset.fromUrl(
          `https://geoportal.n-vartovsk.ru/tls/1/${config.id}/tileset.json`,
          { skipLevelOfDetail: true, baseScreenSpaceError: 1024, skipScreenSpaceErrorFactor: 16, skipLevels: 1, immediatelyLoadDesiredLevelOfDetail: false, loadSiblings: false, cullWithChildrenBounds: true }
        );
        viewer.scene.primitives.add(tileset);
        activeTileset = tileset;
        tileset.modelMatrix = Cesium.Matrix4.fromArray(config.matrix);
        await tileset.readyPromise;
        tilesLoaded = true;
        viewer.zoomTo(tileset).catch(() => { });
        hideLoading();
        showStatus('3D Геопортал · ' + year, '#22c55e');
      } catch (e) {
        console.warn("Geoportal unavailable, trying fallback:", e.message || e);
        loadFallbackBuildings();
      }
    }

    // ── Fallback: OSM Buildings via Cesium Ion ──
    async function loadFallbackBuildings() {
      try {
        // Use Cesium World Terrain for elevation
        viewer.terrainProvider = await Cesium.CesiumTerrainProvider.fromIonAssetId(1);

        // Add OSM Buildings tileset from Cesium Ion
        const osmBuildings = await Cesium.createOsmBuildingsAsync();
        viewer.scene.primitives.add(osmBuildings);
        activeTileset = osmBuildings;
        tilesLoaded = true;

        // Fly to Nizhnevartovsk
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(76.5531, 60.9344, 2000),
          orientation: {
            heading: Cesium.Math.toRadians(0),
            pitch: Cesium.Math.toRadians(-35),
            roll: 0.0
          },
          duration: 2
        });

        hideLoading();
        showStatus('OSM Buildings (фоллбэк)', '#f59e0b');
      } catch (e2) {
        console.warn("OSM Buildings fallback also failed:", e2.message || e2);
        // Final fallback: just show globe with markers
        hideLoading();
        showStatus('Глобус (3D тайлы недоступны)', '#ef4444');
      }
    }

    function hideLoading() {
      const ld = document.getElementById('loading');
      if (ld) ld.style.display = 'none';
    }

    loadGeoportalTiles('2025');

    // Camera to Nizhnevartovsk
    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(76.55536, 60.91927, 800),
      orientation: { heading: Cesium.Math.toRadians(0.179), pitch: Cesium.Math.toRadians(-25), roll: 0.0 }
    });

    // SVG camera icon as data URI
    const CAM_SVG = 'data:image/svg+xml,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="%2300E5FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>'
    );

    // Track camera entities separately
    let cameraEntities = [];

    function addCameras(camerasJson) {
      // Remove old camera entities
      cameraEntities.forEach(e => viewer.entities.remove(e));
      cameraEntities = [];

      let cameras;
      try {
        cameras = typeof camerasJson === 'string' ? JSON.parse(camerasJson) : camerasJson;
      } catch (e) { console.error("Camera parse error", e); return; }

      if (!Array.isArray(cameras)) return;

      cameras.forEach(cam => {
        const lat = parseFloat(cam.lat);
        const lng = parseFloat(cam.lng);
        if (isNaN(lat) || isNaN(lng)) return;

        const streamUrl = cam.s || '';
        const name = cam.n || 'Камера';

        const entity = viewer.entities.add({
          name: '📹 ' + name,
          position: Cesium.Cartesian3.fromDegrees(lng, lat, 15),
          billboard: {
            image: CAM_SVG,
            width: 28, height: 28,
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            disableDepthTestDistance: Number.POSITIVE_INFINITY,
            scaleByDistance: new Cesium.NearFarScalar(500, 1.2, 8000, 0.4)
          },
          label: {
            text: name,
            font: '11px sans-serif',
            fillColor: Cesium.Color.fromCssColorString('#00E5FF'),
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 2,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            verticalOrigin: Cesium.VerticalOrigin.TOP,
            pixelOffset: new Cesium.Cartesian2(0, 8),
            disableDepthTestDistance: Number.POSITIVE_INFINITY,
            scaleByDistance: new Cesium.NearFarScalar(500, 1.0, 5000, 0.0)
          },
          description: '<div style="padding:12px;color:white;font-family:sans-serif;background:rgba(15,23,42,1);border-radius:8px;">' +
            '<h3 style="margin:0 0 8px 0;color:#00E5FF;border-bottom:1px solid #00E5FF;padding-bottom:5px;">📹 КАМЕРА</h3>' +
            '<p style="margin:4px 0;"><b>📍 Адрес:</b> ' + name + '</p>' +
            (streamUrl ? '<p style="margin:8px 0 0 0;"><a href="' + streamUrl + '" style="color:#00E5FF;" target="_blank">▶ Смотреть трансляцию</a></p>' : '') +
            '<p style="margin:8px 0 0 0;font-size:11px;color:#94a3b8;">Источник: cams-online.ru</p>' +
            '</div>'
        });
        cameraEntities.push(entity);
      });

      const counter = document.getElementById('camCount');
      if (counter) { counter.textContent = '📹 ' + cameraEntities.length + ' камер'; counter.style.display = 'block'; }
    }

    // Markers for complaints/projects
    let markerEntities = [];

    function updateMarkers(dataOrBase64) {
      try {
        let data;
        if (typeof dataOrBase64 === 'string' && !dataOrBase64.startsWith('[') && !dataOrBase64.startsWith('{')) {
          data = JSON.parse(atob(dataOrBase64));
        } else {
          data = typeof dataOrBase64 === 'string' ? JSON.parse(dataOrBase64) : dataOrBase64;
        }
        if (!Array.isArray(data)) return;

        markerEntities.forEach(e => viewer.entities.remove(e));
        markerEntities = [];

        data.forEach(m => {
          const lat = parseFloat(m.lat);
          const lng = parseFloat(m.lng);
          const height = parseFloat(m.height || 10);
          if (isNaN(lat) || isNaN(lng)) return;

          const position = Cesium.Cartesian3.fromDegrees(lng, lat, m.type === 'construction' ? height / 2 : 5);
          let entity;

          if (m.type === 'construction') {
            entity = viewer.entities.add({
              name: m.title || 'Стройка', position: position,
              box: { dimensions: new Cesium.Cartesian3(20, 20, height), material: Cesium.Color.fromCssColorString(m.color || '#F59E0B').withAlpha(0.6), outline: true, outlineColor: Cesium.Color.WHITE },
              label: { text: m.title || '🏗', font: 'bold 12px sans-serif', fillColor: Cesium.Color.WHITE, outlineColor: Cesium.Color.BLACK, outlineWidth: 2, style: Cesium.LabelStyle.FILL_AND_OUTLINE, verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -30), disableDepthTestDistance: Number.POSITIVE_INFINITY },
              description: '<div style="padding:15px;color:white;font-family:sans-serif;background:rgba(15,23,42,1);border-radius:8px;"><h3 style="margin:0 0 10px 0;color:#F59E0B;border-bottom:1px solid #F59E0B;padding-bottom:5px;">🏗 ПАСПОРТ ОБЪЕКТА</h3><p style="margin:5px 0;"><b>📍 Адрес:</b> ' + (m.title || '—') + '</p><p style="margin:5px 0;"><b>🏢 Застройщик:</b> ' + (m.developer || '—') + '</p><p style="margin:5px 0;"><b>📅 Срок сдачи:</b> ' + (m.deadline || '—') + '</p><p style="margin:5px 0;"><b>📐 Этажность:</b> ' + (m.floors || '—') + '</p><p style="margin:10px 0 0 0;font-size:12px;color:#cbd5e1;font-style:italic;">' + (m.description || '') + '</p></div>'
            });
          } else {
            entity = viewer.entities.add({
              name: m.title || 'Объект', position: position,
              point: { pixelSize: 12, color: Cesium.Color.fromCssColorString(m.color || '#00E5FF'), outlineColor: Cesium.Color.WHITE, outlineWidth: 2, disableDepthTestDistance: Number.POSITIVE_INFINITY },
              label: { text: m.title || '📍', font: '12px sans-serif', fillColor: Cesium.Color.WHITE, outlineColor: Cesium.Color.BLACK, outlineWidth: 2, style: Cesium.LabelStyle.FILL_AND_OUTLINE, verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -15), disableDepthTestDistance: Number.POSITIVE_INFINITY }
            });
          }
          markerEntities.push(entity);
        });

        if (!tilesLoaded) hideLoading();
      } catch (e) {
        console.error("Cesium error", e);
      }
    }

    window.addEventListener('message', (event) => {
      const message = event.data || {};
      if (message.type === 'citypulse:setCameras') {
        addCameras(message.payload || []);
      }
      if (message.type === 'citypulse:setMarkers') {
        updateMarkers(message.payload || []);
      }
    });

    window.parent?.postMessage({ type: 'citypulse:3d-ready' }, '*');

    // Safety timeout — never keep spinner forever
    setTimeout(() => {
      const ld = document.getElementById('loading');
      if (ld && ld.style.display !== 'none') {
        hideLoading();
        if (!tilesLoaded) showStatus('Загрузка тайлов не удалась', '#ef4444');
      }
    }, 15000);

    viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#020617');
    viewer.scene.globe.depthTestAgainstTerrain = false;
  </script>
</body>

</html>
